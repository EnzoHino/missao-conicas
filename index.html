<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Engenheiro Espacial — Cônicas</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#060b18;--bg-dark:#0a0e1a;--bg-panel:#0f1629;--bg-bar:#111827;
  --border:#1f2937;--border-mid:#374151;
  --text-main:#e8eaf0;--text-muted:#6b7280;--text-dim:#374151;
  --blue:#3b82f6;--blue-dark:#1d4ed8;--blue-hover:#2563eb;
  --blue-bg:#1e3a5f;--blue-text:#93c5fd;
  --green:#4ade80;--green-dark:#166534;--green-bg:#0d2818;
  --amber:#fbbf24;--purple:#a78bfa;--pink:#f472b6;--cyan:#22d3ee;
  --red:#f87171;--red-bg:#3b1515;
  --radius:8px;--radius-lg:12px;
}
body{
  background:#030712;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  color:var(--text-main);
  padding:16px;
}

/* ── GAME SHELL ── */
#game{
  width:900px;max-width:100%;
  background:var(--bg-dark);border-radius:var(--radius-lg);
  overflow:hidden;border:1px solid var(--border);
  display:flex;flex-direction:column;min-height:600px;
}

/* ── TOP BAR ── */
#topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 18px;background:var(--bg-bar);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.game-title{font-size:15px;font-weight:600;color:var(--blue-text);}
.mission-badge{background:var(--blue-bg);color:var(--blue-text);font-size:11px;padding:3px 10px;border-radius:20px;}
.pts{font-size:14px;color:var(--amber);font-weight:500;}

/* progress bar */
#progress-wrap{height:3px;background:var(--border);flex-shrink:0;}
#progress-bar{height:3px;background:var(--blue);transition:width .4s ease;width:0%;}

/* ── MAIN ── */
#main{display:flex;flex:1;min-height:0;}

/* ── SIDEBAR ── */
#sidebar{
  width:210px;min-width:210px;background:var(--bg-panel);
  border-right:1px solid var(--border);padding:12px 8px;
  display:flex;flex-direction:column;gap:4px;overflow-y:auto;
}
#sidebar h3{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;padding-left:4px;}
.mi{padding:8px 10px;border-radius:var(--radius);border:1px solid transparent;}
.mi.done  {background:var(--green-bg);border-color:#16532a;}
.mi.active{background:var(--blue-bg);border-color:var(--blue);}
.mi.locked{background:var(--bg-bar);border-color:var(--border);}
.mi-num{font-size:10px;font-weight:600;margin-bottom:2px;}
.mi.done   .mi-num{color:#16a34a;}
.mi.active .mi-num{color:var(--blue);}
.mi.locked .mi-num{color:var(--text-dim);}
.mi-title{font-size:11px;font-weight:500;}
.mi.done   .mi-title{color:var(--green);}
.mi.active .mi-title{color:var(--blue-text);}
.mi.locked .mi-title{color:var(--text-dim);}
.mi-type{font-size:10px;margin-top:1px;}
.mi.done   .mi-type{color:#16a34a;}
.mi.active .mi-type{color:var(--blue);}
.mi.locked .mi-type{color:var(--text-dim);}

/* ── RIGHT COLUMN ── */
#canvas-area{flex:1;display:flex;flex-direction:column;padding:14px;gap:10px;min-width:0;}

/* ── CANVAS ── */
#sim-wrap{
  flex:1;min-height:230px;
  background:var(--bg-deep);border-radius:var(--radius);
  border:1px solid var(--border);position:relative;overflow:hidden;
}
#cv{display:block;width:100%;height:100%;}
#sim-label{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font-size:10px;color:var(--text-muted);pointer-events:none;
  background:rgba(6,11,24,.7);padding:2px 10px;border-radius:20px;
  white-space:nowrap;
}

/* ── FEEDBACK OVERLAY ── */
#feedback{
  position:absolute;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:rgba(6,11,24,.92);border-radius:var(--radius);
  text-align:center;padding:24px;gap:8px;
}
.fb-icon{font-size:38px;}
.fb-title{font-size:20px;font-weight:600;}
.fb-msg{font-size:12px;color:var(--text-muted);max-width:300px;line-height:1.65;}
.fb-math{
  font-size:13px;color:#a5b4fc;
  background:var(--bg-panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 16px;
  font-family:'Georgia',serif;margin-top:4px;
}
#fb-btn{
  margin-top:10px;background:var(--blue-dark);border:none;color:#fff;
  padding:8px 24px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;
}
#fb-btn:hover{background:var(--blue-hover);}

/* ── CONTROLS PANEL ── */
#controls{
  background:var(--bg-bar);border-radius:var(--radius);
  border:1px solid var(--border);padding:14px;flex-shrink:0;
}
.type-badge{
  display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;
  border-radius:20px;margin-bottom:8px;
}
.type-slider   {background:#1a2f4a;color:var(--blue-text);}
.type-multiple {background:#1a2a1a;color:#86efac;}
.type-numeric  {background:#2d1f00;color:#fcd34d;}
.type-equation {background:#2a1040;color:#c4b5fd;}

#mission-title{font-size:13px;font-weight:600;color:var(--text-main);margin-bottom:6px;}
#mission-desc{
  font-size:11.5px;color:#9ca3af;margin-bottom:12px;line-height:1.65;
  background:rgba(255,255,255,.03);border-radius:6px;
  padding:8px 10px;border-left:2px solid var(--border-mid);
}

/* SLIDER */
.param-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.param-label{font-size:11px;color:#9ca3af;width:110px;flex-shrink:0;}
.param-row input[type="range"]{flex:1;accent-color:var(--blue);cursor:pointer;}
.param-val{font-size:12px;color:var(--text-main);width:44px;text-align:right;font-variant-numeric:tabular-nums;}

/* MULTIPLE CHOICE */
#mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.mc-opt{
  padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border-mid);
  cursor:pointer;font-size:12px;color:#9ca3af;text-align:center;
  transition:all .18s;line-height:1.45;font-family:'Georgia',serif;
}
.mc-opt:hover{border-color:var(--blue);color:var(--blue-text);background:rgba(59,130,246,.08);}
.mc-opt.selected{border-color:var(--blue);color:var(--blue-text);background:rgba(59,130,246,.15);}
.mc-opt.correct{border-color:#16a34a;color:var(--green);background:var(--green-bg);}
.mc-opt.wrong  {border-color:#991b1b;color:var(--red);background:var(--red-bg);}

/* NUMERIC INPUT */
#numeric-wrap{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
#numeric-wrap label{font-size:12px;color:#9ca3af;flex-shrink:0;}
#numeric-input{
  flex:1;background:var(--bg-deep);border:1px solid var(--border-mid);
  color:var(--text-main);border-radius:var(--radius);
  padding:8px 12px;font-size:14px;outline:none;
  font-family:'Georgia',serif;
}
#numeric-input:focus{border-color:var(--blue);}
#numeric-input.correct{border-color:#16a34a;color:var(--green);}
#numeric-input.wrong  {border-color:#991b1b;color:var(--red);}
#numeric-hint{font-size:11px;color:var(--text-muted);margin-top:4px;}

/* EQUATION BUILDER */
#eq-builder{margin-bottom:4px;}
.eq-display{
  font-size:16px;color:#c4b5fd;text-align:center;
  font-family:'Georgia',serif;letter-spacing:.02em;
  background:var(--bg-deep);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 14px;
  margin-bottom:10px;line-height:2;
}
.eq-blank{
  display:inline-block;
  border-bottom:2px solid var(--purple);
  min-width:40px;text-align:center;
  padding:0 4px;color:var(--amber);
  font-size:14px;cursor:text;
}
.eq-inputs{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.eq-field-wrap{display:flex;flex-direction:column;gap:3px;}
.eq-field-label{font-size:10px;color:var(--text-muted);}
.eq-field{
  width:72px;background:var(--bg-deep);border:1px solid var(--border-mid);
  color:var(--amber);border-radius:var(--radius);
  padding:6px 8px;font-size:13px;text-align:center;outline:none;
  font-family:'Georgia',serif;
}
.eq-field:focus{border-color:var(--purple);}
.eq-field.correct{border-color:#16a34a;color:var(--green);}
.eq-field.wrong  {border-color:#991b1b;color:var(--red);}

/* EQUATION PANEL (show eq button) */
#eq-panel{
  display:none;background:var(--bg-deep);border:1px solid var(--border);
  border-radius:var(--radius);padding:9px 14px;font-size:13px;
  color:#a5b4fc;text-align:center;margin-top:8px;
  font-family:'Georgia',serif;letter-spacing:.02em;
}

/* BUTTONS */
#btn-row{display:flex;gap:8px;margin-top:12px;}
#btn-eq{
  background:transparent;border:1px solid var(--border-mid);
  color:#9ca3af;padding:7px 14px;border-radius:var(--radius);
  font-size:12px;cursor:pointer;transition:all .2s;
}
#btn-eq:hover{border-color:#4b5563;color:var(--text-main);}
#btn-confirm{
  background:var(--blue-dark);border:none;color:#fff;
  padding:7px 22px;border-radius:var(--radius);
  font-size:12px;font-weight:500;cursor:pointer;transition:background .2s;
}
#btn-confirm:hover:not(:disabled){background:var(--blue-hover);}
#btn-confirm:disabled{background:var(--border);color:var(--text-dim);cursor:default;}

/* ── WIN SCREEN ── */
#win-screen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:40px;text-align:center;gap:8px;
}
.win-rocket{font-size:52px;}
#win-screen h2{font-size:24px;color:var(--amber);font-weight:600;margin-top:6px;}
#win-screen p{font-size:13px;color:var(--text-muted);}
.win-pts{font-size:52px;font-weight:700;color:var(--blue-text);margin:10px 0;}
.win-stars{font-size:28px;letter-spacing:6px;margin:4px 0;}
#btn-restart{
  margin-top:12px;background:var(--blue-dark);border:none;color:#fff;
  padding:10px 28px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;
}
#btn-restart:hover{background:var(--blue-hover);}
.win-table{
  width:100%;max-width:420px;margin-top:16px;
  border-collapse:collapse;font-size:12px;
}
.win-table td{padding:5px 10px;border-bottom:1px solid var(--border);color:var(--text-muted);}
.win-table td:first-child{text-align:left;}
.win-table td:last-child{text-align:right;color:var(--amber);font-weight:500;}

/* ── RESPONSIVE ── */
@media(max-width:660px){
  #main{flex-direction:column;}
  #sidebar{width:100%;min-width:unset;border-right:none;border-bottom:1px solid var(--border);flex-direction:row;flex-wrap:wrap;padding:8px;}
  .mi{flex:1 1 120px;}
  #mc-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="game">

  <!-- TOP BAR -->
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="game-title">Engenheiro Espacial</span>
      <span class="mission-badge" id="badge">Missão 1 / 10</span>
    </div>
    <div class="pts">Pontos: <span id="score">0</span></div>
  </div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <!-- MAIN -->
  <div id="main">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <h3>missões</h3>
      <!-- items injected by JS -->
    </div>

    <!-- RIGHT -->
    <div id="canvas-area">

      <div id="sim-wrap">
        <canvas id="cv"></canvas>
        <div id="sim-label">simulação</div>
        <div id="feedback">
          <div class="fb-icon" id="fb-icon">✓</div>
          <div class="fb-title" id="fb-title">Missão concluída!</div>
          <div class="fb-msg"   id="fb-msg"></div>
          <div class="fb-math"  id="fb-math" style="display:none"></div>
          <button id="fb-btn">Próxima missão</button>
        </div>
      </div>

      <div id="controls">
        <span class="type-badge" id="type-badge">Slider</span>
        <div id="mission-title">—</div>
        <div id="mission-desc">—</div>
        <div id="answer-area"></div>
        <div id="eq-panel"></div>
        <div id="btn-row">
          <button id="btn-eq" style="display:none">Ver equação</button>
          <button id="btn-confirm">Confirmar</button>
        </div>
      </div>

    </div>
  </div>

  <!-- WIN -->
  <div id="win-screen">
    <div class="win-rocket">🚀</div>
    <h2>Missão completa, Engenheiro!</h2>
    <p>Você concluiu todas as 10 missões.</p>
    <div class="win-pts" id="final-pts">0</div>
    <p>pontos acumulados</p>
    <div class="win-stars" id="win-stars">★★★</div>
    <table class="win-table" id="win-table"></table>
    <button id="btn-restart">Jogar novamente</button>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════
   HELPERS — canvas drawing
═══════════════════════════════════════════════ */
const STARS_DATA = Array.from({length:90},(_,i)=>({
  x:(Math.sin(i*137.508)*.5+.5),
  y:(Math.cos(i*97.306) *.5+.5),
  r:i%7===0?.9:i%3===0?.55:.28,
  bright:i%11===0
}));
function drawStars(ctx,W,H){
  for(const s of STARS_DATA){
    ctx.fillStyle=s.bright?"#374151":"#1f2937";
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();
  }
}
function drawEarth(ctx,cx,cy,r){
  ctx.fillStyle="#1a5c38";ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#4ade80";ctx.beginPath();ctx.arc(cx-r*.2,cy-r*.1,r*.55,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#2563eb";ctx.beginPath();ctx.arc(cx+r*.25,cy+r*.2,r*.4,0,Math.PI*2);ctx.fill();
}
function lbl(ctx,text,x,y,color,size){
  ctx.font=`${size||10}px Inter,system-ui,sans-serif`;
  ctx.fillStyle=color||"#6b7280";ctx.fillText(text,x,y);
}
function drawStar(ctx,x,y,r,color){
  ctx.fillStyle=color||"#fde68a";
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/2;ctx.beginPath();ctx.arc(x+Math.cos(a)*r,y+Math.sin(a)*r,1.2,0,Math.PI*2);ctx.fill();}
  ctx.beginPath();ctx.arc(x,y,r*.5,0,Math.PI*2);ctx.fill();
}
function dashed(ctx,fn,color,lw,dash){
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=lw||1;ctx.setLineDash(dash||[4,5]);
  fn();ctx.stroke();ctx.setLineDash([]);ctx.restore();
}
function solid(ctx,fn,color,lw){
  ctx.save();ctx.strokeStyle=color;ctx.lineWidth=lw||2;
  fn();ctx.stroke();ctx.restore();
}

/* ═══════════════════════════════════════════════
   MISSION DEFINITIONS
═══════════════════════════════════════════════ */
const M = [

  /* ── 0  SLIDER — elipse satélite ── */
  {
    title:"Órbita do Satélite de Comunicação",
    desc:`Um satélite geoestacionário precisa ser inserido em uma órbita elíptica de transferência ao redor da Terra. 
A missão de controle informou que a órbita tem formato alongado horizontalmente. 
Ajuste os semi-eixos até que a trajetória do satélite coincida com a órbita-alvo indicada.`,
    label:"elipse — órbita de transferência",
    conica:"Elipse",type:"slider",
    eqFn:p=>`x² / ${p.a.toFixed(1)}²  +  y² / ${p.b.toFixed(1)}²  =  1`,
    params:[
      {id:"a",label:"Semi-eixo maior (a)",min:2,max:9,step:.1,val:3,target:6},
      {id:"b",label:"Semi-eixo menor (b)",min:1,max:6,step:.1,val:2,target:3.5}
    ],
    check:p=>Math.abs(p.a-6)<.5&&Math.abs(p.b-3.5)<.5,
    pts:150,
    successMsg:"Órbita elíptica confirmada! O satélite está em trajetória estável.",
    failMsg:"Os semi-eixos ainda não atingem a órbita-alvo. Observe a curva tracejada e tente novamente.",
    solutionEq:"x² / 6²  +  y² / 3.5²  =  1",
    draw(ctx,W,H,p){
      const cx=W/2,cy=H/2,sc=Math.min(W,H)*.075;
      const a=p.a*sc,b=p.b*sc,ta=6*sc,tb=3.5*sc;
      drawStars(ctx,W,H);
      dashed(ctx,()=>{ctx.beginPath();ctx.ellipse(cx,cy,ta,tb,0,0,Math.PI*2);},"#1f4060",1.5);
      solid(ctx,()=>{ctx.beginPath();ctx.ellipse(cx,cy,a,b,0,0,Math.PI*2);},"#3b82f6",2);
      drawEarth(ctx,cx,cy,11);
      const t=Date.now()/1500,sx=cx+a*Math.cos(t),sy=cy+b*Math.sin(t);
      ctx.save();ctx.strokeStyle="rgba(251,191,36,.2)";ctx.lineWidth=.7;ctx.setLineDash([2,4]);
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(sx,sy);ctx.stroke();ctx.setLineDash([]);ctx.restore();
      ctx.fillStyle="#fbbf24";ctx.beginPath();ctx.arc(sx,sy,5,0,Math.PI*2);ctx.fill();
      lbl(ctx,"Terra",cx+13,cy+5,"#9ca3af");lbl(ctx,"satélite",sx+7,sy,"#fbbf24");
      lbl(ctx,"órbita-alvo",cx-ta+2,cy-tb-8,"#1f4060");
    }
  },

  /* ── 1  MÚLTIPLA ESCOLHA — identificar equação da elipse ── */
  {
    title:"Qual Equação Representa Esta Órbita?",
    desc:`O radar de rastreamento captou a trajetória de um satélite ao redor de Marte. 
O gráfico ao lado mostra a curva detectada. 
Analise a forma da órbita e identifique qual das equações abaixo a representa corretamente.`,
    label:"elipse — identifique a equação",
    conica:"Elipse",type:"multiple",
    correctIndex:2,
    options:[
      "x² / 9  +  y² / 16  =  1",
      "x² / 16  −  y² / 9  =  1",
      "x² / 16  +  y² / 9  =  1",
      "y²  =  8x"
    ],
    pts:120,
    successMsg:"Correto! A elipse tem semi-eixo maior a=4 (eixo x) e semi-eixo menor b=3 (eixo y).",
    failMsg:"Atenção: a elipse é mais larga no eixo x (a=4 > b=3). Na equação da elipse os denominadores são os quadrados dos semi-eixos.",
    solutionEq:"x² / 4²  +  y² / 3²  =  1  →  a=4, b=3",
    draw(ctx,W,H){
      const cx=W/2,cy=H/2,sc=Math.min(W,H)*.085;
      const a=4*sc,b=3*sc;
      drawStars(ctx,W,H);
      drawEarth(ctx,cx+Math.sqrt(a*a-b*b)*.0,cy,8);// foco aproximado visual
      // planet (Marte)
      ctx.fillStyle="#c2410c";ctx.beginPath();ctx.arc(cx,cy,11,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#ea580c";ctx.beginPath();ctx.arc(cx,cy,9,0,Math.PI*2);ctx.fill();
      solid(ctx,()=>{ctx.beginPath();ctx.ellipse(cx,cy,a,b,0,0,Math.PI*2);},"#3b82f6",2);
      // axis hints
      ctx.save();ctx.strokeStyle="#1f2937";ctx.lineWidth=.6;ctx.setLineDash([3,4]);
      ctx.beginPath();ctx.moveTo(cx-a-12,cy);ctx.lineTo(cx+a+12,cy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy-b-12);ctx.lineTo(cx,cy+b+12);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();
      // dimension labels
      ctx.save();ctx.strokeStyle="#374151";ctx.lineWidth=.8;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+a,cy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,cy-b);ctx.stroke();ctx.restore();
      lbl(ctx,"a = 4",cx+a*.4,cy-8,"#60a5fa",11);
      lbl(ctx,"b = 3",cx+6,cy-b*.55,"#60a5fa",11);
      lbl(ctx,"Marte",cx+13,cy+4,"#fb923c");
      const t=Date.now()/1800,sx=cx+a*Math.cos(t),sy=cy+b*Math.sin(t);
      ctx.fillStyle="#fbbf24";ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);ctx.fill();
    }
  },

  /* ── 2  SLIDER — parábola refletor ── */
  {
    title:"Calibração do Refletor Parabólico",
    desc:`A estação espacial usa uma antena com espelho parabólico para captar sinais de sondas distantes. 
O receptor de sinais precisa estar exatamente no foco da parábola. 
Ajuste o parâmetro da curva até que o foco (ponto amarelo) coincida com o receptor (ponto verde).`,
    label:"parábola — calibração do foco",
    conica:"Parábola",type:"slider",
    eqFn:p=>`x²  =  ${(4*p.p).toFixed(1)} · y`,
    params:[
      {id:"p",label:"Parâmetro focal (p)",min:.5,max:5,step:.1,val:1,target:2.5}
    ],
    check:p=>Math.abs(p.p-2.5)<.4,
    pts:150,

      lbl(ctx,"Sol",cx+13,cy+4,"#fde68a");
      lbl(ctx,"órbita interna (r=2)",cx+r1+4,cy-8,"#0e7490",10);
      lbl(ctx,"órbita externa (r=8)",cx+r2+4,cy-8,"#92400e",10);
      lbl(ctx,"alvo",cx-ta+4,cy-tb-8,"#1f4060");
    }
  }
];

/* ═══════════════════════════════════════════════
   SIDEBAR BUILD
═══════════════════════════════════════════════ */
const TYPE_LABELS = {slider:"Slider",multiple:"Múltipla Escolha",numeric:"Numérico",equation:"Monte a Equação"};
function buildSidebar(){
  const sb=document.getElementById("sidebar");
  sb.innerHTML="<h3>missões</h3>";
  M.forEach((m,i)=>{
    const div=document.createElement("div");
    div.className="mi "+(i<state.current?"done":i===state.current?"active":"locked");
    div.id="mi"+i;
    div.innerHTML=`<div class="mi-num">${String(i+1).padStart(2,"0")}</div>
      <div class="mi-title">${m.title.split(" ").slice(0,3).join(" ")}…</div>
      <div class="mi-type">${m.conica} — ${TYPE_LABELS[m.type]}</div>`;
    sb.appendChild(div);
  });
}

/* ═══════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════ */
const state={current:0,score:0,answered:false,eqVisible:false,pValues:{},fieldValues:{},scores:[]};
let animId=null;
const canvas=document.getElementById("cv");
const ctx2d=canvas.getContext("2d");

function resizeCanvas(){
  const r=document.getElementById("sim-wrap").getBoundingClientRect();
  canvas.width=r.width||560;canvas.height=r.height||250;
}

/* ── RENDER LOOP ── */
function render(){
  resizeCanvas();
  ctx2d.fillStyle="#060b18";ctx2d.fillRect(0,0,canvas.width,canvas.height);
  const m=M[state.current];
  const pOrF=m.type==="slider"?getP():m.type==="equation"?state.fieldValues:{};
  m.draw(ctx2d,canvas.width,canvas.height,pOrF);
  animId=requestAnimationFrame(render);
}

function getP(){
  const p={};
  const m=M[state.current];
  if(m.params) m.params.forEach(pr=>{p[pr.id]=parseFloat(state.pValues[pr.id]??pr.val);});
  return p;
}

/* ── BUILD CONTROLS ── */
function buildControls(){
  const m=M[state.current];
  document.getElementById("badge").textContent=`Missão ${state.current+1} / ${M.length}`;
  document.getElementById("progress-bar").style.width=`${(state.current/M.length)*100}%`;
  document.getElementById("mission-title").textContent=m.title;
  document.getElementById("mission-desc").textContent=m.desc;
  document.getElementById("sim-label").textContent=m.label;

  // type badge
  const tb=document.getElementById("type-badge");
  const cls={slider:"type-slider",multiple:"type-multiple",numeric:"type-numeric",equation:"type-equation"};
  tb.className="type-badge "+cls[m.type];
  tb.textContent=TYPE_LABELS[m.type];

  // clear
  document.getElementById("answer-area").innerHTML="";
  document.getElementById("eq-panel").style.display="none";
  state.eqVisible=false;
  document.getElementById("btn-confirm").disabled=false;
  document.getElementById("btn-confirm").textContent="Confirmar";
  document.getElementById("feedback").style.display="none";
  state.answered=false;
  state.pValues={};state.fieldValues={};

  const beq=document.getElementById("btn-eq");

  if(m.type==="slider"){
    beq.style.display="block";
    beq.textContent="Ver equação";
    buildSlider(m);
  } else if(m.type==="multiple"){
    beq.style.display="none";
    buildMultiple(m);
  } else if(m.type==="numeric"){
    beq.style.display="none";
    buildNumeric(m);
  } else if(m.type==="equation"){
    beq.style.display="none";
    buildEquation(m);
  }
}

function buildSlider(m){
  const area=document.getElementById("answer-area");
  m.params.forEach(pr=>{
    state.pValues[pr.id]=pr.val;
    const row=document.createElement("div");row.className="param-row";
    const lbl2=document.createElement("div");lbl2.className="param-label";lbl2.textContent=pr.label;
    const inp=document.createElement("input");inp.type="range";inp.min=pr.min;inp.max=pr.max;inp.step=pr.step;inp.value=pr.val;
    const valEl=document.createElement("div");valEl.className="param-val";valEl.id="pv_"+pr.id;valEl.textContent=pr.val.toFixed(1);
    inp.addEventListener("input",()=>{
      state.pValues[pr.id]=parseFloat(inp.value);
      valEl.textContent=parseFloat(inp.value).toFixed(1);
      if(state.eqVisible) updateEqPanel();
    });
    row.append(lbl2,inp,valEl);area.appendChild(row);
  });
}

function buildMultiple(m){
  const area=document.getElementById("answer-area");
  const grid=document.createElement("div");grid.id="mc-grid";
  m.options.forEach((opt,i)=>{
    const btn=document.createElement("div");btn.className="mc-opt";btn.textContent=opt;
    btn.addEventListener("click",()=>{
      if(state.answered)return;
      document.querySelectorAll(".mc-opt").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      state.mcSelected=i;
    });
    grid.appendChild(btn);
  });
  area.appendChild(grid);
}

function buildNumeric(m){
  const area=document.getElementById("answer-area");
  area.innerHTML=`
    <div id="numeric-wrap">
      <label>Resposta:</label>
      <input type="number" id="numeric-input" placeholder="Digite o valor" step="0.01"/>
      <span style="font-size:12px;color:var(--text-muted)">${m.unit}</span>
    </div>
    <div id="numeric-hint">${m.hint}</div>`;
  document.getElementById("numeric-input").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("btn-confirm").click();});
}

function buildEquation(m){
  const area=document.getElementById("answer-area");
  // display with blanks
  let displayHTML=m.eqDisplay;
  m.fields.forEach(f=>{
    displayHTML=displayHTML.replace(`[${f.id}]`,`<span class="eq-blank" id="blank_${f.id}">___</span>`);
  });
  const dispDiv=document.createElement("div");dispDiv.className="eq-display";dispDiv.innerHTML=displayHTML;
  area.appendChild(dispDiv);

  const inputsDiv=document.createElement("div");inputsDiv.className="eq-inputs";
  m.fields.forEach(f=>{
    state.fieldValues[f.id]="";
    const wrap=document.createElement("div");wrap.className="eq-field-wrap";
    const lbl2=document.createElement("div");lbl2.className="eq-field-label";lbl2.textContent=f.label;
    const inp=document.createElement("input");inp.type="number";inp.className="eq-field";inp.id="ef_"+f.id;
    inp.placeholder=f.placeholder;inp.step="0.1";
    inp.addEventListener("input",()=>{
      state.fieldValues[f.id]=parseFloat(inp.value)||0;
      const blank=document.getElementById("blank_"+f.id);
      if(blank) blank.textContent=inp.value||"___";
    });
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("btn-confirm").click();});
    wrap.append(lbl2,inp);inputsDiv.appendChild(wrap);
  });
  area.appendChild(inputsDiv);
}

function updateEqPanel(){
  const m=M[state.current];
  if(m.eqFn) document.getElementById("eq-panel").textContent=m.eqFn(getP());
}

/* ── CONFIRM LOGIC ── */
function doConfirm(){
  if(state.answered)return;
  state.answered=true;
  const m=M[state.current];
  let ok=false;

  if(m.type==="slider"){
    ok=m.check(getP());
  } else if(m.type==="multiple"){
    const sel=state.mcSelected;
    if(sel===undefined){state.answered=false;return;}
    ok=(sel===m.correctIndex);
    // highlight options
    document.querySelectorAll(".mc-opt").forEach((btn,i)=>{
      if(i===m.correctIndex) btn.classList.add("correct");
      else if(i===sel&&!ok) btn.classList.add("wrong");
    });
  } else if(m.type==="numeric"){
    const val=parseFloat(document.getElementById("numeric-input").value);
    if(isNaN(val)){state.answered=false;return;}
    ok=Math.abs(val-m.answer)<=m.tolerance;
    document.getElementById("numeric-input").classList.add(ok?"correct":"wrong");
  } else if(m.type==="equation"){
    ok=m.check(state.fieldValues);
    m.fields.forEach(f=>{
      const inp=document.getElementById("ef_"+f.id);
      if(inp){
        const v=parseFloat(inp.value)||0;
        inp.classList.add(Math.abs(v-f.target)<1?"correct":"wrong");
      }
    });
  }

  const pts=ok?m.pts:Math.round(m.pts*.35);
  state.score+=pts;
  state.scores.push({title:m.title,pts,max:m.pts,ok});
  document.getElementById("score").textContent=state.score;
  document.getElementById("btn-confirm").disabled=true;

  showFeedback(ok,m,pts);
}

function showFeedback(ok,m,pts){
  const fb=document.getElementById("feedback");
  document.getElementById("fb-icon").textContent=ok?"✓":"✗";
  document.getElementById("fb-title").textContent=ok?`Missão concluída! +${pts} pts`:`Incorreto — +${pts} pts`;
  document.getElementById("fb-title").style.color=ok?"#4ade80":"#f87171";
  document.getElementById("fb-msg").textContent=ok?m.successMsg:m.failMsg;
  const fbMath=document.getElementById("fb-math");
  if(m.solutionEq){fbMath.textContent="Solução: "+m.solutionEq;fbMath.style.display="block";}
  else fbMath.style.display="none";
  document.getElementById("fb-btn").textContent=state.current<M.length-1?"Próxima missão":"Ver resultado final";
  fb.style.display="flex";
}

/* ── EVENT LISTENERS ── */
document.getElementById("btn-eq").addEventListener("click",()=>{
  state.eqVisible=!state.eqVisible;
  const ep=document.getElementById("eq-panel");
  ep.style.display=state.eqVisible?"block":"none";
  document.getElementById("btn-eq").textContent=state.eqVisible?"Ocultar equação":"Ver equação";
  if(state.eqVisible) updateEqPanel();
});

document.getElementById("btn-confirm").addEventListener("click",doConfirm);

document.getElementById("fb-btn").addEventListener("click",()=>{
  document.getElementById("feedback").style.display="none";
  document.getElementById("fb-title").style.color="";
  if(state.current<M.length-1){
    state.current++;
    buildSidebar();
    buildControls();
  } else {
    showWin();
  }
});

document.getElementById("btn-restart").addEventListener("click",()=>{
  state.current=0;state.score=0;state.answered=false;state.eqVisible=false;state.scores=[];
  state.mcSelected=undefined;
  document.getElementById("score").textContent=0;
  document.getElementById("win-screen").style.display="none";
  document.getElementById("main").style.display="flex";
  document.getElementById("topbar").style.display="flex";
  document.getElementById("progress-wrap").style.display="block";
  buildSidebar();buildControls();
  cancelAnimationFrame(animId);render();
});

/* ── WIN ── */
function showWin(){
  cancelAnimationFrame(animId);
  document.getElementById("main").style.display="none";
  document.getElementById("topbar").style.display="none";
  document.getElementById("progress-wrap").style.display="none";
  document.getElementById("win-screen").style.display="flex";
  document.getElementById("final-pts").textContent=state.score;
  const maxTotal=M.reduce((s,m)=>s+m.pts,0);
  const pct=state.score/maxTotal;
  document.getElementById("win-stars").textContent=pct>=.8?"★★★":pct>=.5?"★★☆":"★☆☆";
  const tbl=document.getElementById("win-table");
  tbl.innerHTML="<tr><td><b style='color:var(--text-main)'>Missão</b></td><td><b style='color:var(--text-main)'>Pontos</b></td></tr>";
  state.scores.forEach(s=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${s.ok?"✓":"✗"} ${s.title}</td><td>${s.pts} / ${s.max}</td>`;
    tbl.appendChild(tr);
  });
  const tr=document.createElement("tr");
  tr.innerHTML=`<td style="color:var(--text-main);font-weight:600">Total</td><td style="color:var(--amber);font-weight:700">${state.score} / ${maxTotal}</td>`;
  tbl.appendChild(tr);
}

/* ── INIT ── */
window.addEventListener("load",()=>{
  resizeCanvas();buildSidebar();buildControls();render();
});
window.addEventListener("resize",resizeCanvas);
</script>
</body>
</html>
